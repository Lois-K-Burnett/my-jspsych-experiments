<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Word Study – Phase 2</title>

  <!-- jsPsych 8.x core -->
  <script src="https://unpkg.com/jspsych@8.2.2"></script>
  <!-- Plugins used in this experiment -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@2.0.1"></script>
  <!-- slider-based confidence question uses html-keyboard-response only — no extra plugin needed -->
  <!-- jsPsych default stylesheet -->
  <link rel="stylesheet" href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" />

  <style>
    /* ─── Global overrides for a clean, lab-grade appearance ─── */
    :root {
      --text:      #f5f4f0;
      --bg:        #1a1a1a;
      --accent:    #6FD9FC;
      --light:     #1a1a1a;
      --border:    #ccc;
      --font-stim: 'Georgia', serif;     /* stimulus words */
      --font-ui:   'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
    }

    /* jsPsych content area */
    #jspsych-content {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Vertical centering for word trials ── */
    /* jsPsych wraps content in #jspsych-display; we want true vertical center */
   /*.jspsych-display-element {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }*/

    /* ── Stimulus word display ── */
    .word-stimulus {
      font-family: var(--font-stim);
      font-size: 3.5em;
      font-weight: normal;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      margin: 0;
      padding: 0;
      line-height: 1;
    }

    /* ── Reminder bar shown during task ── */
    /*.reminder-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--accent);
      color: var(--light);
      font-size: 0.78em;
      letter-spacing: 0.03em;
      text-align: center;
      padding: 8px 16px;
      font-family: var(--font-ui);
      z-index: 999;
    } */

    /* ── Fixation cross ── */
    .fixation {
      font-size: 3.5em;
      color: #f5f4f0;
      text-align: center;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Instructions styling ── */
    .jspsych-instructions-nav {
      margin-top: 30px;
    }

    .jspsych-content p {
      font-size: 1.1em;
      line-height: 1.7;
      max-width: 680px;
      margin: 0 auto 1em auto;
    }

    .jspsych-content h2 {
      font-size: 1.4em;
      font-weight: bold;
      text-align: center;
      margin-bottom: 24px;
      color: var(--accent);
    }

    .key-label {
      display: inline-block;
      background: var(--text);
      color: var(--light);
      border-radius: 5px;
      padding: 2px 10px;
      font-family: monospace;
      font-size: 1em;
      margin: 0 2px;
    }

    /* ── Confidence slider ── */
    .slider-container {
      max-width: 620px;
      margin: 0 auto;
      padding: 10px 0 40px;
    }

    .slider-prompt {
      font-size: 1.1em;
      line-height: 1.75;
      max-width: 620px;
      margin: 0 auto 32px auto;
      text-align: center;
    }

    .slider-value-display {
      font-size: 2.2em;
      font-weight: bold;
      color: var(--accent);
      text-align: center;
      margin-bottom: 16px;
      font-family: var(--font-ui);
      min-height: 1.2em;
    }

    .slider-value-display span {
      font-size: 0.55em;
      font-weight: normal;
      color: #666;
    }

    input[type=range].confidence-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) 50%, #ccc 50%, #ccc 100%);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type=range].confidence-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid white;
      box-shadow: 0 1px 5px rgba(0,0,0,0.25);
      cursor: pointer;
    }

    input[type=range].confidence-slider::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid white;
      box-shadow: 0 1px 5px rgba(0,0,0,0.25);
      cursor: pointer;
    }

    .tick-marks {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 2px;
    }

    .tick-marks span {
      font-size: 0.82em;
      color: #777;
      text-align: center;
      width: 30px;
      margin: 0 -15px;
    }

    .tick-marks span:first-child { margin-left: 0; }
    .tick-marks span:last-child  { margin-right: 0; }


    /* ── Survey / expectation question ── */
    .survey-prompt {
      font-size: 1.15em;
      line-height: 1.7;
      max-width: 660px;
      margin: 0 auto 12px auto;
    }

    /* ── Recognition memory task ── */
  .recog-wrap {
    max-width: 700px;
    margin: 0 auto;
    padding: 36px 16px 40px;
  }
  .recog-wrap h2 {
    color: var(--accent);
    font-size: 1.3em;
    text-align: center;
    margin-bottom: 10px;
  }
  .recog-prompt {
    font-size: 1.05em;
    line-height: 1.7;
    text-align: center;
    max-width: 600px;
    margin: 0 auto 28px auto;
    color: var(--text);
  }
  .recog-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .recog-cell {
    background: #252525;
    border: 2px solid #3a3a3a;
    border-radius: 8px;
    padding: 18px 8px;
    font-family: var(--font-stim);
    font-size: 1.1em;
    letter-spacing: 0.06em;
    text-align: center;
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .recog-cell:hover {
    border-color: var(--accent);
  }
  .recog-cell.selected {
    background: #1565c0;
    border-color: #1e88e5;
    color: #fff;
  }
  .recog-continue-btn {
    display: block;
    margin: 0 auto;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 11px 38px;
    font-size: 1em;
    font-family: var(--font-ui);
    cursor: pointer;
    letter-spacing: 0.04em;
  }

  /* ── End-of-task message ── */
    .end-message {
      font-size: 1.3em;
      text-align: center;
      line-height: 1.8;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Progress indicator (trial counter) ── */
    .trial-counter {
      position: fixed;
      top: 10px;
      right: 18px;
      font-size: 0.75em;
      color: #999;
      font-family: var(--font-ui);
      z-index: 999;
    }

  /* ── Practice feedback ── */
  .practice-feedback {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 14px;
  }
  .feedback-accuracy {
    font-size: 2em;
    font-weight: bold;
  }
  .feedback-accuracy.correct  { color: #6FD9FC; }
  .feedback-accuracy.incorrect { color: #ff6b6b; }
  .feedback-rt {
    font-size: 1em;
    color: #999;
  }

  
  /* ── Reminder setup page (reminders condition) ── */
  .setup-wrap {
    max-width: 580px;
    margin: 0 auto;
    padding: 36px 16px 24px;

  .setup-wrap h2 {

    font-size: 1.35em;
    text-align: center;
    margin-bottom: 10px;

    font-size: 1.0em;
    line-height: 1.65;
    text-align: center;
    margin-bottom: 22px;
    color: var(--text);
  }
  .setup-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .setup-row-label {
    font-size: 0.82em;
    color: #888;
    width: 64px;
    flex-shrink: 0;
    text-align: right;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .setup-input {
    flex: 1;
    padding: 9px 13px;
    font-size: 1em;
    font-family: var(--font-stim);
    letter-spacing: 0.07em;
    background: #252525;
    color: var(--text);
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    outline: none;
    text-transform: uppercase;
  }
  .setup-input:focus { border-color: var(--accent); }
  .setup-input:disabled { opacity: 0.5; }
  .setup-save-btn {
    padding: 9px 16px;
    font-size: 0.88em;
    font-family: var(--font-ui);
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .setup-save-btn:hover { background: var(--accent); color: var(--bg); }
  .setup-save-btn.saved { background: var(--accent); color: var(--bg); }
  .setup-tick {
    font-size: 1em;
    color: var(--accent);
    width: 20px;
    flex-shrink: 0;
  }
  .setup-continue-btn {
    display: block;
    margin: 28px auto 0;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 11px 38px;
    font-size: 1em;
    font-family: var(--font-ui);
    cursor: pointer;
    letter-spacing: 0.04em;
  }

  /* ── Word trial layout for reminders condition ── */
  .word-trial-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
  }
  .remind-me-btn {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 7px 26px;
    font-size: 0.82em;
    font-family: var(--font-ui);
    letter-spacing: 0.05em;
    cursor: pointer;
    opacity: 0.65;
    margin-top: 48px;
  }
  .remind-me-btn:hover { opacity: 1; }
  .rm-grid-inline {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 48px;
    width: min(360px, 80vw);
  }
  .rm-cell {
    background: #282828;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    padding: 14px 8px 12px;
    text-align: center;
  }
  .rm-cell-label {
    font-size: 0.65em;
    color: #666;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .rm-cell-word {
    font-family: var(--font-stim);
    font-size: 1.15em;
    letter-spacing: 0.06em;
    color: var(--text);
    min-height: 1.3em;
  }
  .rm-cell-word.rm-empty {
    color: #444;
    font-style: italic;
    font-size: 0.85em;
  }

  /* ── Condition selector screen ── */
  .condition-wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 60px 24px 40px;
    text-align: center;
  }
  .condition-wrap h2 {
    color: var(--accent);
    font-size: 1.5em;
    margin-bottom: 12px;
  }
  .condition-wrap p {
    font-size: 1em;
    color: #aaa;
    margin-bottom: 32px;
  }
  .condition-btn-group {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .condition-btn {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    border-radius: 8px;
    padding: 18px 32px;
    font-size: 1.4em;
    font-family: var(--font-ui);
    font-weight: bold;
    cursor: pointer;
    min-width: 80px;
    transition: background 0.15s, color 0.15s;
  }
  .condition-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }
  </style>
</head>

function buildWordList(targetWords, controlWords, fillerWords) {
  const TOTAL   = 150;
  const MIN_GAP = 3;

  const targetOccurrences = [];
  targetWords.forEach(word => {
    const tSyl = SYLLABLE_MAP[word] || null;
    const tCR  = tSyl ? String(tSyl) : null;
    targetOccurrences.push({ word, isTarget: true,  isControl: false, syllables: tSyl, correct_response: tCR });
    targetOccurrences.push({ word, isTarget: true,  isControl: false, syllables: tSyl, correct_response: tCR });
  });
  shuffleArray(targetOccurrences);

  const controlOccurrences = [];
  controlWords.forEach(word => {
    const cSyl = SYLLABLE_MAP[word] || null;
    const cCR  = cSyl ? String(cSyl) : null;
    controlOccurrences.push({ word, isTarget: false, isControl: true, syllables: cSyl, correct_response: cCR });
    controlOccurrences.push({ word, isTarget: false, isControl: true, syllables: cSyl, correct_response: cCR });
  });
  shuffleArray(controlOccurrences);

  const fillerPool = fillerWords.map(w => { const s = SYLLABLE_MAP[w] || null; return { word: w, isTarget: false, isControl: false, syllables: s, correct_response: s ? String(s) : null }; });

  let list;
  let attempts = 0;
  while (true) {
    attempts++;
    list = new Array(TOTAL).fill(null);
    PARAMS.targetPositions.forEach((pos, i) => { list[pos] = targetOccurrences[i]; });

    const candidates = [];
    for (let i = 0; i < TOTAL; i++) { if (list[i] === null) candidates.push(i); }
    shuffleArray(candidates);

    const placedControlPositions = [];
    let placedCount = 0;
    for (const candidate of candidates) {
      if (placedCount === controlOccurrences.length) break;
      let forbidden = false;
      const specialPositions = [...PARAMS.targetPositions, ...placedControlPositions];
      for (const sp of specialPositions) {
        if (candidate > sp && candidate <= sp + MIN_GAP) { forbidden = true; break; }
      }
      if (!forbidden) {
        list[candidate] = controlOccurrences[placedCount];
        placedControlPositions.push(candidate);
        placedCount++;
      }
    }
    if (placedCount === controlOccurrences.length) break;
    if (attempts > 1000) { console.error('buildWordList: constraint not satisfied.'); break; }
  }

  shuffleArray(fillerPool);
  let fillerIndex = 0;
  for (let i = 0; i < TOTAL; i++) {
    if (list[i] === null) list[i] = fillerPool[fillerIndex++];
  }
  return list;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

             + item.word + '</div>';

      choices: ['1', '2', ' '],

        word:                item.word,
        is_target:           item.isTarget,
        is_control:          item.isControl,
        syllables:           item.syllables,
        correct_response:    item.correct_response,
        trial_index_in_task: index,
      },
      on_finish: function(data) {
        data.key_pressed_primary       = data.response;
        data.spacebar_pressed_primary  = (data.response === ' ');
        data.syllable_response_primary = (['1','2'].includes(data.response)) ? data.response : null;

    const wordSecondary = {
      conditional_function: function() {
        const d = jsPsych.data.get().filter({ trial_type_label: 'word_primary_nr', trial_index_in_task: index }).last(1).values();
        return d.length > 0 && d[0].spacebar_pressed_primary === true;
      },
      timeline: [{
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          return '<div class="word-stimulus" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">'

        on_finish: function(data) { data.syllable_response_secondary = data.response; data.response_correct = (data.response === data.correct_response); data.rt_secondary = data.rt; }

      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: 'NO_KEYS',
      trial_duration: PARAMS.itiDuration,
      on_finish: function(data) { data.trial_type_label = 'iti_nr'; data.trial_index_in_task = index; }
    };

    timeline.push(fixation, wordPrimary, wordSecondary, iti);
  });
  return timeline;
}

      <p style="color:#888;font-size:0.9em;margin-top:24px;">Press Enter to continue.</p>
    </div>
  `,
  choices: ['Enter'],
  on_load: function() {
    const slider  = document.getElementById('confidence-slider-r');
    const display = document.getElementById('slider-val-r');
    function updateSlider() {
      const pct = slider.value + '%';
      slider.style.background = 'linear-gradient(to right, var(--accent) 0%, var(--accent) ' + pct + ', #ccc ' + pct + ', #ccc 100%)';
      display.textContent = slider.value;
    }
    slider.addEventListener('input', updateSlider);
    updateSlider();
    // Fix: slider captures focus and swallows Enter before jsPsych sees it.
    // Defer by one event-loop tick so any Enter keydown carried over from the
    // preceding instructions trial is fully flushed before we start listening.
    setTimeout(function() {
      document.addEventListener('keydown', function onEnterR(e) {
        if (e.key === 'Enter') {
          document.removeEventListener('keydown', onEnterR);
          // Capture value now, while DOM still exists, then finish.
          const val = parseInt(document.getElementById('confidence-slider-r').value, 10);
          jsPsych.finishTrial({ trial_type_label: 'pm_confidence_r', confidence_value: val });
          jsPsych.data.addProperties({ confidence_r: val });
        }
      });
    }, 0);
  },
  post_trial_gap: 1000,
  on_finish: function(data) {
    data.trial_type_label = data.trial_type_label || 'pm_confidence_r';
  }
};

// ── Final pace reminder — reminders condition ─────────────────────────────────
const instructionsP23R = {
  type: jsPsychInstructions,
  pages: [
    `<p>Don't forget that your primary goal is to make syllable decisions as quickly and accurately as possible.</p>
     <p style="color:#888;font-size:0.9em;margin-top:24px;">The task will begin when you press ENTER.</p>`,
  ],
  show_clickable_nav: false,
  allow_backward: false,
  key_forward: 'Enter',
  on_finish: function(data) { data.trial_type_label = 'instructions_p23_r'; }
};

// ── Word trials — reminders condition ────────────────────────────────────────
function makeWordTrialsR() {
  const timeline = [];
  let trialCounter = 0;

  wordListR.forEach((item, index) => {
    let remindWasOpen = false;

    function buildCells() {
      const labels = ['Target 1','Target 2','Target 3','Target 4'];
      return savedReminders.map((r, i) => {
        const wordHtml = !r
          ? '<div class="rm-cell-word rm-empty">—</div>'
          : '<div class="rm-cell-word">' + r.text + '</div>';
        return '<div class="rm-cell"><div class="rm-cell-label">' + labels[i] + '</div>' + wordHtml + '</div>';
      }).join('');
    }

    const fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="fixation">+</div>',
      choices: 'NO_KEYS',
      trial_duration: PARAMS.fixationDuration,
      on_finish: function(data) { data.trial_type_label = 'fixation_r'; data.trial_index_in_task = index; }
    };

    const wordPrimary = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        trialCounter++;
        return '<div class="word-trial-wrap">'
             +   '<div class="word-stimulus">' + item.word + '</div>'
             +   '<button class="remind-me-btn" id="rm-btn">Remind me!</button>'
             +   '<div class="rm-grid-inline" id="rm-grid">' + buildCells() + '</div>'
             + '</div>';
      },
      on_load: function() {
        const btn  = document.getElementById('rm-btn');
        const grid = document.getElementById('rm-grid');
        function openReminder() {
          btn.style.display  = 'none';
          grid.style.display = 'grid';
          remindWasOpen = true;
          const row = jsPsych.data.get().last(1).values()[0];
          if (row) row.remind_me_clicked = true;
        }
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          openReminder();
        });
        document.addEventListener('keydown', function onShiftPrimary(e) {
          if (e.key === 'Shift' && !remindWasOpen) {
            document.removeEventListener('keydown', onShiftPrimary);
            openReminder();
          }
        });
      },
      choices: ['1', '2', ' '],
      data: {
        trial_type_label:    'word_primary_r',
        word:                item.word,
        is_target:           item.isTarget,
        is_control:          item.isControl,
        syllables:           item.syllables,
        correct_response:    item.correct_response,
        trial_index_in_task: index,
        remind_me_clicked:   false,
      },
      on_finish: function(data) {
        data.key_pressed_primary       = data.response;
        data.spacebar_pressed_primary  = (data.response === ' ');
        data.syllable_response_primary = (['1','2'].includes(data.response)) ? data.response : null;
        data.response_correct          = (data.syllable_response_primary !== null) ? (data.syllable_response_primary === data.correct_response) : null;
        data.rt_primary = data.rt;
      }
    };

    const wordSecondary = {
      conditional_function: function() {
        const d = jsPsych.data.get().filter({ trial_type_label: 'word_primary_r', trial_index_in_task: index }).last(1).values();
        return d.length > 0 && d[0].spacebar_pressed_primary === true;
      },
      timeline: [{
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          const btnDisplay  = remindWasOpen ? 'none' : 'inline-block';
          const gridDisplay = remindWasOpen ? 'grid' : 'none';
          return '<div class="word-trial-wrap">'
               +   '<div class="word-stimulus">' + item.word + '</div>'
               +   '<button class="remind-me-btn" id="rm-btn-s" style="display:' + btnDisplay + '">Remind me!</button>'
               +   '<div class="rm-grid-inline" id="rm-grid-s" style="display:' + gridDisplay + '">' + buildCells() + '</div>'
               + '</div>';
        },
        on_load: function() {
          if (!remindWasOpen) {
            const btn  = document.getElementById('rm-btn-s');
            const grid = document.getElementById('rm-grid-s');
            function openReminderS() {
              btn.style.display  = 'none';
              grid.style.display = 'grid';
              remindWasOpen = true;
            }
            btn.addEventListener('click', function(e) {
              e.stopPropagation();
              openReminderS();
            });
            document.addEventListener('keydown', function onShiftSecondary(e) {
              if (e.key === 'Shift' && !remindWasOpen) {
                document.removeEventListener('keydown', onShiftSecondary);
                openReminderS();
              }
            });
          }
        },
        choices: ['1', '2'],
        data: { trial_type_label: 'word_secondary_r', word: item.word, is_target: item.isTarget, is_control: item.isControl, syllables: item.syllables, correct_response: item.correct_response, trial_index_in_task: index },
        on_finish: function(data) { data.syllable_response_secondary = data.response; data.response_correct = (data.response === data.correct_response); data.rt_secondary = data.rt; }
      }]
    };

    const iti = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: 'NO_KEYS',
      trial_duration: PARAMS.itiDuration,
      on_finish: function(data) { data.trial_type_label = 'iti_r'; data.trial_index_in_task = index; }
    };

    timeline.push(fixation, wordPrimary, wordSecondary, iti);
  });
  return timeline;
}

// ── End of reminders condition ────────────────────────────────────────────────
const endPhase2R = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="end-message">
      <h2>Part 2 Complete</h2>
      <p>You have completed the second part of the task. Well done!</p>
      <p>Please wait for the research coordinator before continuing.</p>
      <p style="color:#888;font-size:0.85em;margin-top:30px;">Press any key to save the data.</p>
    </div>
  `,
  choices: 'ALL_KEYS',
  on_finish: function(data) { data.trial_type_label = 'end_r'; }
};


// ── Recognition memory task — no-reminders condition ─────────────────────────
const recognitionNR = {
  type: jsPsychHtmlKeyboardResponse,
  choices: 'NO_KEYS',
  stimulus: function() {
    const words = [...TARGET_WORDS_NR, ...CONTROL_WORDS_NR];
    // Fisher-Yates shuffle on a copy
    for (let i = words.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [words[i], words[j]] = [words[j], words[i]];
    }
    const cells = words.map((w, i) =>
      `<div class="recog-cell" id="recog-nr-${i}" data-word="${w}">${w}</div>`
    ).join('');
    return `
      <div class="recog-wrap">
        <p class="recog-prompt">The first SPEED task is done. Before moving on, please select which of the words presented below are the target words that you were instructed to remember.</p>
        <div class="recog-grid">${cells}</div>
        <p style="color:#888;font-size:0.9em;margin-top:8px;">Press Enter to continue.</p>
      </div>`;
  },
  on_load: function() {
    const selected = new Set();
    document.querySelectorAll('.recog-cell').forEach(cell => {
      cell.addEventListener('click', function() {
        const w = this.dataset.word;
        if (selected.has(w)) {
          selected.delete(w);
          this.classList.remove('selected');
        } else {
          selected.add(w);
          this.classList.add('selected');
        }
      });
    });
    setTimeout(function() {
      document.addEventListener('keydown', function onEnterRecogNR(e) {
        if (e.key === 'Enter') {
          document.removeEventListener('keydown', onEnterRecogNR);
          jsPsych.finishTrial({
            trial_type_label: 'recognition_nr',
            selected_words: JSON.stringify([...selected]),
            hits:    TARGET_WORDS_NR.filter(w => selected.has(w)).length,
            misses:  TARGET_WORDS_NR.filter(w => !selected.has(w)).length,
            false_alarms: CONTROL_WORDS_NR.filter(w => selected.has(w)).length,
          });
        }
      });
    }, 0);
  },
  on_finish: function(data) { data.trial_type_label = data.trial_type_label || 'recognition_nr'; }
};

// ── Recognition memory task — reminders condition ─────────────────────────────

// ============================================================
//  CONDITION SELECTOR  (plain HTML — runs before jsPsych)
// ============================================================
// The word trial arrays are spread into the timeline at construction time,
// so the timeline must be built AFTER a condition is chosen. We show a plain
// HTML screen first, then build and run the timeline on button click.

function startExperiment(conditionNum) {
  // 1. Populate all word arrays for the chosen condition
  const c = CONDITIONS[conditionNum];
  TARGET_WORDS_NR  = c.phase1.targets;
  CONTROL_WORDS_NR = c.phase1.controls;
  FILLER_WORDS_NR  = c.phase1.fillers;
  TARGET_WORDS_R   = c.phase2.targets;
  CONTROL_WORDS_R  = c.phase2.controls;
  FILLER_WORDS_R   = c.phase2.fillers;
  wordListNR = buildWordList(TARGET_WORDS_NR, CONTROL_WORDS_NR, FILLER_WORDS_NR);
  wordListR  = buildWordList(TARGET_WORDS_R,  CONTROL_WORDS_R,  FILLER_WORDS_R);

  // 2. Record condition in jsPsych data
  jsPsych.data.addProperties({ condition: conditionNum });

  // 3. Clear the selector screen so jsPsych can take over the display
  document.getElementById('condition-selector-screen').remove();

  // 4. Build and run the timeline now that word lists exist
  const timeline = [
    // ── No-reminders condition ──
    speedInstructions,
    ...makePracticeTrials(),
    goodJobInstructions,
    targetReminder,
    expectationQuestionNR,
    instructionsP23NR,
    ...makeWordTrialsNR(),
    recognitionNR,
    endPhase2NR,

    // ── Reminders condition ──
    instructionsP1R,
    reminderSetup,
    expectationQuestionR,
    instructionsP23R,
    ...makeWordTrialsR(),
    recognitionR,
    endPhase2R,
  ];

  jsPsych.run(timeline);
}

(function() {

      <div class="condition-btn-group">
        <button class="condition-btn" onclick="startExperiment(1)">1</button>
        <button class="condition-btn" onclick="startExperiment(2)">2</button>
        <button class="condition-btn" onclick="startExperiment(3)">3</button>
        <button class="condition-btn" onclick="startExperiment(4)">4</button>
      </div>
    </div>
  `;
  document.body.appendChild(screen);
})();
