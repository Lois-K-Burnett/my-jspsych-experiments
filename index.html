<body>
<script>
// ============================================================
//  SHARED CONFIGURATION
//  Used by both the no-reminders and reminders conditions.
// ============================================================

const PARAMS = {
  fixationDuration:  500,
  wordDuration:      null,
  itiDuration:       300,
  syllableKeys: ['1', '2'],
  targetKey:    ' ',
  targetPositions: [24, 49, 74, 99, 124, 149, 174, 199],
};

// Each condition has its own unique target and control words.
const TARGET_WORDS_NR  = ['SUNSET', 'FOREST', 'RIVER', 'MARKET'];   // no-reminders targets
const CONTROL_WORDS_NR = ['GLEAM', 'GROAN', 'RHYTHM', 'RIDDLE'];    // no-reminders controls

const TARGET_WORDS_R   = ['GARDEN', 'WINTER', 'SILVER', 'BARREL'];  // reminders targets
const CONTROL_WORDS_R  = ['FLAME', 'DRIFT', 'NARROW', 'LANTERN'];   // reminders controls

const FILLER_WORDS = [
  'CAT','DOG','TREE','GLASS','BOOK','HAND','DOOR','TIME','PATH','SHIP',
  'STONE','BIRD','FACE','STREET','DARK','BRIGHT','SHARP','THICK','SMOOTH','LOUD',
  'CLOUD','FLAME','BLADE','FLOOR','COAL','GRAIN','SLEEP','FROST','DRAFT','BLOOD',
  'BRIDGE','CHEST','CLOAK','PLAIN','SCREAM','PRINCE','STEEL','SWAMP','THRONE','TORCH',
  'BRUSH','CRANE','DRIFT','FLINT','GLEAM','GRIME','GROWL','GUILD','HEARTH','HOUND',
  'KNEEL','LANCE','LEACH','MARSH','MOAT','NICHE','NOTCH','PLUNGE','POUNCE','PROWL',
  'QUILL','RIDGE','ROUSE','SCALD','SCOUT','SHEATH','SHROUD','SIEGE','SKIM','SLEET',
  'SMEAR','SNARE','SPAWN','SPUR','SQUALL','STENCH','STRIDE','STRIFE','SWEAR','THUD',
  'TINGE','TORQUE','TRENCH','TRUDGE','TWIRL','VAULT','VEIL','VERGE','WRAITH','WRATH',
  'BLISS','BRINK','BROOD','CRINGE',
  'APPLE','GARDEN','TABLE','WINDOW','HAMMER','BOTTLE','CANDLE','CASTLE','CIRCLE','COLLAR',
  'CORNER','COTTON','CURTAIN','CUSHION','DAGGER','DANCER','DESERT','DIAMOND','DISTANT','DONKEY',
  'DRAGON','EARRING','EMBER','ENTRANCE','ESCORT','EVENING','EXPAND','FEATHER','FELLOW','FESTIVE',
  'FINGER','FLICKER','FLOWER','FORTUNE','FOSSIL','FRAGRANT','FROZEN','GATHER','GENTLE','GOBLIN',
  'GOSSIP','GRANITE','GRAVEL','HASTEN','HELMET','HERALD','HIDDEN','HOLLOW','HONOR','HORNET',
  'HURDLE','INFANT','INWARD','ISLAND','JACKET','JESTER','KINDLE','KINGDOM','LANTERN','LESSON',
  'LINEN','LIQUID','LIVER','LIZARD','MARBLE','MEADOW','MERCHANT','MIRROR','MISSION','MONKEY',
  'MUSCLE','NARROW','NESTLE','NOTICE','NYMPH-LIKE','OBJECT','OFFER','ORANGE','OUTSET','OYSTER',
  'PALACE','PARDON','PEPPER','PIGEON','PILGRIM','PLANET','PLASTER','PLUNDER','POTION','PRISON',
  'PURPLE','PYTHON','RADIANT','RATION','RAVEN','REBEL',
];

function buildWordList(targetWords, controlWords) {
  const TOTAL   = 200;
  const MIN_GAP = 3;

  const targetOccurrences = [];
  targetWords.forEach(word => {
    targetOccurrences.push({ word, isTarget: true,  isControl: false });
    targetOccurrences.push({ word, isTarget: true,  isControl: false });
  });
  shuffleArray(targetOccurrences);

  const controlOccurrences = [];
  controlWords.forEach(word => {
    controlOccurrences.push({ word, isTarget: false, isControl: true });
    controlOccurrences.push({ word, isTarget: false, isControl: true });
  });
  shuffleArray(controlOccurrences);

  const fillerPool = FILLER_WORDS.map(w => ({ word: w, isTarget: false, isControl: false }));

  let list;
  let attempts = 0;
  while (true) {
    attempts++;
    list = new Array(TOTAL).fill(null);
    PARAMS.targetPositions.forEach((pos, i) => { list[pos] = targetOccurrences[i]; });

    const candidates = [];
    for (let i = 0; i < TOTAL; i++) { if (list[i] === null) candidates.push(i); }
    shuffleArray(candidates);

    const placedControlPositions = [];
    let placedCount = 0;
    for (const candidate of candidates) {
      if (placedCount === controlOccurrences.length) break;
      let forbidden = false;
      const specialPositions = [...PARAMS.targetPositions, ...placedControlPositions];
      for (const sp of specialPositions) {
        if (candidate > sp && candidate <= sp + MIN_GAP) { forbidden = true; break; }
      }
      if (!forbidden) {
        list[candidate] = controlOccurrences[placedCount];
        placedControlPositions.push(candidate);
        placedCount++;
      }
    }
    if (placedCount === controlOccurrences.length) break;
    if (attempts > 1000) { console.error('buildWordList: constraint not satisfied.'); break; }
  }

  shuffleArray(fillerPool);
  let fillerIndex = 0;
  for (let i = 0; i < TOTAL; i++) {
    if (list[i] === null) list[i] = fillerPool[fillerIndex++];
  }
  return list;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// Each condition gets its own independently shuffled word list with
// unique target and control words.
const wordListNR = buildWordList(TARGET_WORDS_NR, CONTROL_WORDS_NR);
const wordListR  = buildWordList(TARGET_WORDS_R,  CONTROL_WORDS_R);

// savedReminders is used only by the reminders condition but declared at the
// top level so it is in scope when reminderSetup and makeWordTrialsR run.
const savedReminders = [null, null, null, null];

// ============================================================
//  INITIALISE JSPSYCH  (single instance for the whole session)
// ============================================================
const jsPsych = initJsPsych({
  on_finish: function () {
    document.body.innerHTML = `
      <div style="max-width:700px;margin:60px auto;font-family:'Helvetica Neue',sans-serif;color:#f5f4f0;background:#1a1a1a;padding:40px;">
        <h2 style="color:#6FD9FC;">Session Complete</h2>
        <p>Thank you. Both tasks are now complete and the data have been recorded.</p>
        <textarea rows="18" style="width:100%;font-size:0.8em;font-family:monospace;border:1px solid #444;padding:10px;background:#252525;color:#f5f4f0;"
          readonly>${jsPsych.data.get().csv()}</textarea>
        <br><br>
        <button onclick="downloadData()" style="background:#6FD9FC;color:#1a1a1a;border:none;padding:10px 24px;font-size:1em;border-radius:4px;cursor:pointer;">
          Download CSV
        </button>
      </div>
    `;
  }
});

function downloadData() {
  const csv  = jsPsych.data.get().csv();
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `combined_data_${Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
//  NO-REMINDERS CONDITION
// ============================================================

// ── SPEED instructions (4 pages) ─────────────────────────────────────────────
const speedInstructions = {
  type: jsPsychInstructions,
  pages: [
   `<h2>Welcome!</h2>
    <p>We are investigating the speed with which certain words and syllables are processed.</p>
     <p>Your task is to indicate whether each word contains 1 or 2 syllables.</p>
     <p>Whenever a word contains <strong>1 syllable</strong>, press the <span class="key-label">1</span> key.</p>
     <p>Whenever a word contains <strong>2 syllables</strong>, press the <span class="key-label">2</span> key.</p>`,

    `<p>This is called the <strong>SPEED</strong> task because the goal is to respond as quickly as possible.</p>
     <p>Try to respond as soon as you can without sacrificing accuracy.</p>
     <p>Words are presented in a random order, so do not try to predict the upcoming word — that will only slow you down.</p>`,

    `<p>In this task, a <strong>"+"</strong> will appear in the center of the screen before each word appears.</p>
     <p>This is your fixation point — it indicates where the word will appear.</p>
     <p>Please use only one hand to respond to this task. Leave your non-dominant hand in your lap.</p>`,

    `<p>Try a few for practice!</p>
     <p>In these practice trials, you will be given feedback on the accuracy and speed of your performance.</p>
     <p>Try to make your decision as quickly as possible without sacrificing accuracy.</p>
     <p>Any questions?</p>`,
  ],
  show_clickable_nav: true,
  allow_backward: false,
  button_label_next: 'Next',
  on_finish: function(data) { data.trial_type_label = 'speed_instructions'; }
};

// ── Practice trials ───────────────────────────────────────────────────────────
const PRACTICE_WORDS = [
  { word: 'CAT',    syllables: 1, correct: '1' },
  { word: 'STONE',  syllables: 1, correct: '1' },
  { word: 'FLAME',  syllables: 1, correct: '1' },
  { word: 'DRIFT',  syllables: 1, correct: '1' },
  { word: 'VAULT',  syllables: 1, correct: '1' },
  { word: 'APPLE',  syllables: 2, correct: '2' },
  { word: 'GARDEN', syllables: 2, correct: '2' },
  { word: 'WINDOW', syllables: 2, correct: '2' },
  { word: 'CASTLE', syllables: 2, correct: '2' },
  { word: 'HAMMER', syllables: 2, correct: '2' },
];
(function() {
  for (let i = PRACTICE_WORDS.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [PRACTICE_WORDS[i], PRACTICE_WORDS[j]] = [PRACTICE_WORDS[j], PRACTICE_WORDS[i]];
  }
})();

function makePracticeTrials() {
  const timeline = [];
  PRACTICE_WORDS.forEach((item, idx) => {
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="fixation">+</div>',
      choices: 'NO_KEYS',
      trial_duration: PARAMS.fixationDuration,
      on_finish: function(data) { data.trial_type_label = 'practice_fixation'; data.practice_index = idx; }
    });
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="word-stimulus" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">' + item.word + '</div>',
      choices: ['1', '2'],
      data: { trial_type_label: 'practice_word', word: item.word, syllables: item.syllables, correct_response: item.correct, practice_index: idx },
      on_finish: function(data) { data.response_correct = (data.response === data.correct_response); data.rt_ms = Math.round(data.rt); }
    });
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        const last = jsPsych.data.get().filter({ trial_type_label: 'practice_word', practice_index: idx }).last(1).values()[0];
        const correct = last && last.response_correct;
        const rt = last ? last.rt_ms : '—';
        return '<div class="practice-feedback">'
             +   '<div class="feedback-accuracy ' + (correct ? 'correct' : 'incorrect') + '">' + (correct ? 'Correct' : 'Incorrect') + '</div>'
             +   '<div class="feedback-rt">' + rt + ' ms</div>'
             + '</div>';
      },
      choices: 'NO_KEYS',
      trial_duration: 1500,
      on_finish: function(data) { data.trial_type_label = 'practice_feedback'; data.practice_index = idx; }
    });
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: 'NO_KEYS',
      trial_duration: PARAMS.itiDuration,
      on_finish: function(data) { data.trial_type_label = 'practice_iti'; data.practice_index = idx; }
    });
  });
  return timeline;
}

// ── "Good job" PM instructions ────────────────────────────────────────────────
const goodJobInstructions = {
  type: jsPsychInstructions,
  pages: [
    `<h2>Good job!</h2>
     <p>We are also interested in your ability to remember to perform a certain task at a specific point in the future.</p>
     <p>During the SPEED task, we would like you to press the <span class="key-label">Spacebar</span> whenever you see one of the four target words below.</p>
     <p><strong>${TARGET_WORDS_NR[0]}&emsp;${TARGET_WORDS_NR[1]}&emsp;${TARGET_WORDS_NR[2]}&emsp;${TARGET_WORDS_NR[3]}</strong></p>
     <p>These four target words will appear among the words you see during the SPEED task. You can press the Spacebar to indicate that you've seen a target word before or after making your syllable decision. If you forget to press the Spacebar right away, you can do it as soon as you remember.</p>`,
  ],
  show_clickable_nav: true,

// ── Word trials — no-reminders condition ──────────────────────────────────────
function makeWordTrialsNR() {
  const timeline = [];

      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="fixation">+</div>',

      trial_duration: PARAMS.fixationDuration,
      on_finish: function(data) { data.trial_type_label = 'fixation_nr'; data.trial_index_in_task = index; }
    };

    const wordPrimary = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        trialCounter++;
        return '<div class="word-stimulus" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">'
             + item.word + '</div>';
      },
      choices: ['1', '2', ' '],
      data: {
        trial_type_label:    'word_primary_nr',
        word:                item.word,
        is_target:           item.isTarget,
        is_control:          item.isControl,
        trial_index_in_task: index,
      },
      on_finish: function(data) {
        data.key_pressed_primary       = data.response;
        data.spacebar_pressed_primary  = (data.response === ' ');
        data.syllable_response_primary = (['1','2'].includes(data.response)) ? data.response : null;
        data.rt_primary = data.rt;
      }
    };

    const wordSecondary = {
      conditional_function: function() {
        const d = jsPsych.data.get().filter({ trial_type_label: 'word_primary_nr', trial_index_in_task: index }).last(1).values();
        return d.length > 0 && d[0].spacebar_pressed_primary === true;
      },
      timeline: [{
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          return '<div class="word-stimulus" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">'
               + item.word + '</div>';

        choices: ['1', '2'],
        data: { trial_type_label: 'word_secondary_nr', word: item.word, is_target: item.isTarget, is_control: item.isControl, trial_index_in_task: index },
        on_finish: function(data) { data.syllable_response_secondary = data.response; data.rt_secondary = data.rt; }
      }]
    };

    const iti = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: 'NO_KEYS',
      trial_duration: PARAMS.itiDuration,
      on_finish: function(data) { data.trial_type_label = 'iti_nr'; data.trial_index_in_task = index; }

    timeline.push(fixation, wordPrimary, wordSecondary, iti);

  return timeline;

      <p><strong>${TARGET_WORDS_R[0]}&emsp;${TARGET_WORDS_R[1]}&emsp;${TARGET_WORDS_R[2]}&emsp;${TARGET_WORDS_R[3]}</strong></p>
      ${[0,1,2,3].map(i => `

        <input class="setup-input" id="ri${i}" type="text" maxlength="40"

// ── Word trials — reminders condition ────────────────────────────────────────
function makeWordTrialsR() {
  const timeline = [];
  let trialCounter = 0;

  wordListR.forEach((item, index) => {
    let remindWasOpen = false;

    function buildCells() {
      const labels = ['Target 1','Target 2','Target 3','Target 4'];
      return savedReminders.map((r, i) => {
        const wordHtml = !r
          ? '<div class="rm-cell-word rm-empty">—</div>'
          : '<div class="rm-cell-word">' + r.text + '</div>';
        return '<div class="rm-cell"><div class="rm-cell-label">' + labels[i] + '</div>' + wordHtml + '</div>';
      }).join('');
    }

    const fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="fixation">+</div>',
      choices: 'NO_KEYS',
      trial_duration: PARAMS.fixationDuration,
      on_finish: function(data) { data.trial_type_label = 'fixation_r'; data.trial_index_in_task = index; }
    };

    const wordPrimary = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        trialCounter++;
        return '<div class="word-trial-wrap">'
             +   '<div class="word-stimulus">' + item.word + '</div>'
             +   '<button class="remind-me-btn" id="rm-btn">Remind me!</button>'
             +   '<div class="rm-grid-inline" id="rm-grid">' + buildCells() + '</div>'
             + '</div>';
      },
      on_load: function() {
        const btn  = document.getElementById('rm-btn');
        const grid = document.getElementById('rm-grid');
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          btn.style.display  = 'none';
          grid.style.display = 'grid';
          remindWasOpen = true;
          const row = jsPsych.data.get().last(1).values()[0];
          if (row) row.remind_me_clicked = true;
        });
      },
      choices: ['1', '2', ' '],
      data: {
        trial_type_label:    'word_primary_r',
        word:                item.word,
        is_target:           item.isTarget,
        is_control:          item.isControl,
        trial_index_in_task: index,
        remind_me_clicked:   false,
      },
      on_finish: function(data) {
        data.key_pressed_primary       = data.response;
        data.spacebar_pressed_primary  = (data.response === ' ');
        data.syllable_response_primary = (['1','2'].includes(data.response)) ? data.response : null;
        data.rt_primary = data.rt;
      }
    };

    const wordSecondary = {
      conditional_function: function() {
        const d = jsPsych.data.get().filter({ trial_type_label: 'word_primary_r', trial_index_in_task: index }).last(1).values();
        return d.length > 0 && d[0].spacebar_pressed_primary === true;
      },
      timeline: [{
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          const btnDisplay  = remindWasOpen ? 'none' : 'inline-block';
          const gridDisplay = remindWasOpen ? 'grid' : 'none';
          return '<div class="word-trial-wrap">'
               +   '<div class="word-stimulus">' + item.word + '</div>'
               +   '<button class="remind-me-btn" id="rm-btn-s" style="display:' + btnDisplay + '">Remind me!</button>'
               +   '<div class="rm-grid-inline" id="rm-grid-s" style="display:' + gridDisplay + '">' + buildCells() + '</div>'
               + '</div>';
        },
        on_load: function() {
          if (!remindWasOpen) {
            const btn  = document.getElementById('rm-btn-s');
            const grid = document.getElementById('rm-grid-s');
            btn.addEventListener('click', function(e) {
              e.stopPropagation();
              btn.style.display  = 'none';
              grid.style.display = 'grid';
            });
          }
        },
        choices: ['1', '2'],
        data: { trial_type_label: 'word_secondary_r', word: item.word, is_target: item.isTarget, is_control: item.isControl, trial_index_in_task: index },
        on_finish: function(data) { data.syllable_response_secondary = data.response; data.rt_secondary = data.rt; }
      }]
    };

    const iti = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: 'NO_KEYS',
      trial_duration: PARAMS.itiDuration,
      on_finish: function(data) { data.trial_type_label = 'iti_r'; data.trial_index_in_task = index; }
    };

    timeline.push(fixation, wordPrimary, wordSecondary, iti);
  });
  return timeline;
}
